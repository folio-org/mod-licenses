type: object
description: A field the widget's results table can be sorted by.
properties:
  name:
    type: string
    description: Internal field identifier.
  label:
    type: string
    description: Display label for the field.
  sortPath:
    type: string
    description: Dot-path/query field used when sorting.
  sortTypes:
    type: array
    description: Supported sort directions.
    items:
      type: string
      enum:
        - asc
        - desc
additionalProperties: true
