type: object
description: A field available for building a structured filter.
properties:
  name:
    type: string
    description: Internal field identifier.
  label:
    type: string
    description: Display label for the field.
  filterPath:
    type: string
    description: Dot-path/query field the filter is applied to.
  valueType:
    type: string
    description: >-
      Value type the filter compares, e.g. `String`, `UUID`, `Date`,
      `Enum`, `Array`.
  resource:
    type: string
    description: >-
      For `valueType: UUID` reference filters, the related resource type to
      look up candidate values from.
  comparators:
    type: array
    description: Comparison operators the UI may offer for this filter.
    items:
      type: string
  enumValues:
    type: array
    description: 'For `valueType: Enum` filters, the allowed values.'
    items:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
additionalProperties: true
