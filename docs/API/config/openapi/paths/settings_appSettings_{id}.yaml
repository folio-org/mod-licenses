parameters:
  - $ref: ../common/parameters/x-okapi-tenant.yaml
  - $ref: ../common/parameters/appSettingId.yaml
get:
  tags:
    - Settings
  summary: Get a specified application setting record
  operationId: getAppSetting
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../common/schemas/AppSetting.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
put:
  tags:
    - Settings
  summary: Update application setting record
  operationId: putAppSetting
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../common/schemas/AppSetting.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../common/schemas/AppSetting.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/ValidationErrorResponse.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
delete:
  tags:
    - Settings
  summary: Delete a specified application setting record
  operationId: deleteAppSetting
  responses:
    '204':
      description: No content
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
