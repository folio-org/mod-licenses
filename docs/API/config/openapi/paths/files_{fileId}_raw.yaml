get:
  tags:
    - Files
  summary: Download the raw content of a specified file
  operationId: getFileRaw
  parameters:
    - $ref: ../components/parameters/fileId.yaml
    - $ref: ../common/parameters/x-okapi-tenant.yaml
  responses:
    '200':
      description: >-
        OK. The response body is the raw file content; the Content-Type
        header reflects the original uploaded file's content type.
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
