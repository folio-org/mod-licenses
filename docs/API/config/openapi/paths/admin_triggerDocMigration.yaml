get:
  tags:
    - Admin
  summary: Trigger migration of uploaded documents to object storage
  description: >-
    Migrates uploaded license document (LOB) attachments still stored in the
    Postgres database to the configured S3/MinIO object store.
  operationId: getAdminTriggerDocMigration
  parameters:
    - $ref: ../common/parameters/x-okapi-tenant.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: OK
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
