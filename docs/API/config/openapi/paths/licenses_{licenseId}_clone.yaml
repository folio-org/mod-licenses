post:
  tags:
    - Licenses
  summary: Clone a specified license record
  operationId: postLicenseClone
  parameters:
    - $ref: ../components/parameters/licenseId.yaml
    - $ref: ../common/parameters/x-okapi-tenant.yaml
  requestBody:
    content:
      application/json:
        schema:
          type: object
          description: Flags indicating which groups of fields, or individual fields, to copy onto the cloned license. Each key is either a group name (copies every field in that group) or one of the individual field names, set to true to copy it.
          properties:
            licenseInfo:
              type: boolean
              description: 'Group: copy name, type, description and status'
            internalContacts:
              type: boolean
              description: 'Group: copy contacts'
            organizations:
              type: boolean
              description: 'Group: copy orgs'
            coreDocs:
              type: boolean
              description: 'Group: copy docs'
            terms:
              type: boolean
              description: 'Group: copy customProperties'
            licenseDateInfo:
              type: boolean
              description: 'Group: copy endDateSemantics, startDate and endDate'
            name:
              type: boolean
              description: Copy the license name
            type:
              type: boolean
              description: Copy the license type
            description:
              type: boolean
              description: Copy the license description
            status:
              type: boolean
              description: Copy the license status
            contacts:
              type: boolean
              description: Copy internal contacts
            orgs:
              type: boolean
              description: Copy organizations
            docs:
              type: boolean
              description: Copy documents
            customProperties:
              type: boolean
              description: Copy custom properties (terms)
            endDateSemantics:
              type: boolean
              description: Copy end date semantics
            startDate:
              type: boolean
              description: Copy the start date
            endDate:
              type: boolean
              description: Copy the end date
            supplementaryDocs:
              type: boolean
              description: Copy supplementary documents
          additionalProperties:
            type: boolean
            description: Any other single field name on the license, set to true to copy it
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/License.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/ValidationErrorResponse.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
