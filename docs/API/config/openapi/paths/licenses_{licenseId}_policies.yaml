get:
  tags:
    - Access Control
  summary: Get the access policies for the specified license record, across its ownership chain
  operationId: getLicensePolicies
  parameters:
    - $ref: ../components/parameters/licenseId.yaml
    - $ref: ../common/parameters/x-okapi-tenant.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../common/schemas/OwnerPolicyLinkList.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
