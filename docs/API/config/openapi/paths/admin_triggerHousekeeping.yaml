get:
  tags:
    - Admin
  summary: Trigger license housekeeping
  description: >-
    Runs the license housekeeping service. This sets `endDateSemantics` on any
    records where it is unset, and deletes any Organisation records no longer 
    linked to a license.
  operationId: getAdminTriggerHousekeeping
  parameters:
    - $ref: ../common/parameters/x-okapi-tenant.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: OK
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
