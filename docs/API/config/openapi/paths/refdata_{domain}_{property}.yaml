description: >-
  Look up the reference data values for a single property of a domain class,
  e.g. the valid `status` values for `License`. The domain and property are
  combined into a reference data category name internally. An unrecognised
  `domain` returns a 404; an unrecognised `property` on a valid `domain` does
  not error, it returns a 200 with an empty result set, since a category name
  is always derived even when nothing matches it.
parameters:
  - $ref: ../common/parameters/x-okapi-tenant.yaml
  - $ref: ../common/parameters/refdataDomain.yaml
  - $ref: ../common/parameters/refdataProperty.yaml
get:
  tags:
    - Reference Data
  summary: Get the reference data values for a domain class property.
  operationId: getRefdataValuesForProperty
  parameters:
    $ref: ../common/parameters/queryParameters.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../components/schemas/RefDataResults.yaml
              - $ref: ../components/schemas/RefDataResultsArray.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: >-
        Not found error: `domain` does not match any known domain class.
        Note an unrecognised `property` on a valid `domain` does not trigger
        this; it returns 200 with an empty result set instead. This action
        does not write its own error body, so the response has no content.
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
