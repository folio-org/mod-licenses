get:
  summary: Get a specified license record
  operationId: getLicense
  parameters:
    - $ref: ../components/parameters/licenseId.yaml
    - $ref: ../components/parameters/x-okapi-tenant.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/License.yaml
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error
put:
  summary: Update license record
  operationId: putLicense
  parameters:
    - $ref: ../components/parameters/licenseId.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/License.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/License.yaml
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error  
delete:
  summary: Delete a specified license record
  operationId: deleteLicense
  parameters:
    - $ref: ../components/parameters/licenseId.yaml
  responses:
    '204':
      description: No content
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error