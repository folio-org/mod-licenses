get:
  tags:
    - Licenses
  summary: Get a specified license record
  operationId: getLicense
  parameters:
    - $ref: ../components/parameters/licenseId.yaml
    - $ref: ../common/parameters/x-okapi-tenant.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/License.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
put:
  tags:
    - Licenses
  summary: Update license record
  operationId: putLicense
  parameters:
    - $ref: ../components/parameters/licenseId.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/License.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/License.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/ValidationErrorResponse.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
delete:
  tags:
    - Licenses
  summary: Delete a specified license record
  operationId: deleteLicense
  parameters:
    - $ref: ../components/parameters/licenseId.yaml
  responses:
    '204':
      description: No content
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
