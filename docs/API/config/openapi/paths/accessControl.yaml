description: Supports search of access policy records. Access policies cannot be created, updated or deleted directly here — use the claim endpoints on the owning resource instead.
parameters:
  - $ref: ../common/parameters/x-okapi-tenant.yaml
get:
  tags:
    - Access Control
  summary: Get a set of access policy records
  operationId: getAccessControls
  parameters:
    $ref: ../common/parameters/queryParameters.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../common/schemas/AccessPolicyResults.yaml
              - $ref: ../common/schemas/AccessPolicyResultsArray.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
