get:
  tags:
    - Custom Properties
  summary: Get a specified custom property definition record
  operationId: getCustomPropertyDefinition
  parameters:
    - $ref: ../components/parameters/custPropId.yaml
    - $ref: ../common/parameters/x-okapi-tenant.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CustomPropertyDefinition.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
put:
  tags:
    - Custom Properties
  summary: Update custom property definition record
  operationId: putCustomPropertyDefinition
  parameters:
    - $ref: ../components/parameters/custPropId.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CustomPropertyDefinition.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CustomPropertyDefinition.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/ValidationErrorResponse.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
delete:
  tags:
    - Custom Properties
  summary: Delete a specified custom property definition record
  operationId: deleteCustomPropertyDefinition
  parameters:
    - $ref: ../components/parameters/custPropId.yaml
  responses:
    '204':
      description: No content
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
