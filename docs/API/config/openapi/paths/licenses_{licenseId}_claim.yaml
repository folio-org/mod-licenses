post:
  tags:
    - Access Control
  summary: Claim the specified license record with a set of access policies
  operationId: postLicenseClaim
  parameters:
    - $ref: ../components/parameters/licenseId.yaml
    - $ref: ../common/parameters/x-okapi-tenant.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../common/schemas/ClaimBody.yaml
    required: true
  responses:
    '200':
      description: OK, no changes were made
      content:
        application/json:
          schema:
            $ref: ../common/schemas/AccessPolicyClaimResponse.yaml
    '201':
      description: Created, access policies were updated
      content:
        application/json:
          schema:
            $ref: ../common/schemas/AccessPolicyClaimResponse.yaml
    '400':
      description: Bad request error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/AccessPolicyClaimResponse.yaml
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../common/schemas/AccessPolicyClaimResponse.yaml
    '404':
      description: Not found error
    '405':
      description: Claiming is not supported on this resource
      content:
        application/json:
          schema:
            $ref: ../common/schemas/AccessPolicyClaimResponse.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
