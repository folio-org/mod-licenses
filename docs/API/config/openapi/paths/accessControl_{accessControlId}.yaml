get:
  tags:
    - Access Control
  summary: Get a specified access policy record
  operationId: getAccessControl
  parameters:
    - in: path
      name: accessControlId
      description: UUID for an access policy
      required: true
      schema:
        type: string
        format: uuid
    - $ref: ../common/parameters/x-okapi-tenant.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../common/schemas/AccessPolicy.yaml
    '400':
      description: Bad request error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found error
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../common/schemas/GrailsErrorResponse.yaml
