  /dashboard/definitions:
    get:
      tags:
        - Dashboard
      summary: List dashboard widget definitions
      description: |-
        Returns the dashboard widget definitions bundled with this module, describing the self-service search/list widgets (e.g. simple license search) that can be added to a FOLIO dashboard. Definitions are cached in memory after the first request, for the lifetime of the running instance. No specific permission is required beyond a valid tenant/token.

        This path is provided under the `dashboard` interface, declared as `interfaceType: multiple` in the module descriptor, because other dashboard-capable modules (e.g. mod-agreements) expose the same path for their own widget definitions. Since more than one module enabled for a tenant can answer this exact path, a plain request is ambiguous — Okapi needs an `X-Okapi-Module-Id` header naming which one to route to. Discover the candidate module ids first with `GET /_/proxy/tenants/{tenant}/modules?provide=dashboard`, then pass one of them back on this request.
      operationId: getDashboardDefinitions
      parameters:
        - $ref: '#/components/parameters/x-okapi-tenant'
        - $ref: '#/components/parameters/x-okapi-module-id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DashboardWidgetDefinition'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrailsErrorResponse'
components:
  securitySchemes:
    okapiToken:
      type: apiKey
      in: header
      name: x-okapi-token
    accessToken:
      type: apiKey
      in: cookie
      name: folioAccessToken
  parameters:
    x-okapi-tenant:
      in: header
      name: x-okapi-tenant
      required: true
      schema:
        type: string
    filters:
      in: query
      name: filters
      required: false
      schema:
        type: string
    match:
      in: query
      name: match
      required: false
      schema:
        type: string
    term:
      in: query
      name: term
      required: false
      schema:
        type: string
    sort:
      in: query
      name: sort
      required: false
      schema:
        type: string
    stats:
      in: query
      name: stats
      required: false
      schema:
        type: boolean
    perPage:
      in: query
      name: perPage
      required: false
      schema:
        type: integer
    offset:
      in: query
      name: offset
      required: false
      schema:
        type: integer
    page:
      in: query
      name: page
      required: false
      schema:
        type: integer
    licenseId:
      in: path
      name: licenseId
      description: UUID for a license
      required: true
      schema:
        type: string
        format: uuid
    amendmentId:
      in: path
      name: amendmentId
      description: UUID for an amendment
      required: true
      schema:
        type: string
        format: uuid
    contactId:
      in: path
      name: contactId
      description: ID for an internal contact
      required: true
      schema:
        type: string
    orgId:
      in: path
      name: orgId
      description: ID for an organisation
      required: true
      schema:
        type: string
    refdataCategoryId:
      in: path
      name: refdataCategoryId
      description: ID for a reference data category
      required: true
      schema:
        type: string
    refdataDomain:
      in: path
      name: domain
      description: Simple (case-insensitive) name of the domain class that owns the property, e.g. `License`, `LicenseAmendment`
      required: true
      schema:
        type: string
    refdataProperty:
      in: path
      name: property
      description: Name of the refdata-backed property on the domain class, e.g. `type` (on `License`)
      required: true
      schema:
        type: string
    custPropId:
      in: path
      name: custPropId
      description: ID for a custom property definition
      required: true
      schema:
        type: string
    fileId:
      in: path
      name: fileId
      description: UUID for a file
      required: true
      schema:
        type: string
        format: uuid
    appSettingId:
      in: path
      name: id
      description: Identifier for an application setting
      required: true
      schema:
        type: string
    x-okapi-module-id:
      in: header
      name: X-Okapi-Module-Id
      required: true
      description: 'ID of the specific module to route this request to. Required on paths  backed by an `interfaceType: multiple` interface'
      schema:
        type: string
  schemas:
    ResultsMeta:
      type: object
      properties:
        meta:
          type: object
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        totalRecords:
          type: integer
    RefData:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          readOnly: true
        label:
          type: string
        value:
          type: string
        owner:
          $ref: '#/components/schemas/RefDataCategory'
    RefDataCategory:
      type: object
      required:
        - id
      properties:
        desc:
          type: string
        id:
          type: string
          readOnly: true
        internal:
          type: boolean
        values:
          type: array
          items:
            $ref: '#/components/schemas/RefData'
    Tag:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          readOnly: true
        value:
          type: string
        normValue:
          type: string
    DocumentAttachment:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        note:
          type: string
        url:
          type: string
          format: uri
        dateCreated:
          type: string
          format: date-time
          readOnly: true
        lastUpdated:
          type: string
          format: date-time
          readOnly: true
    InternalContact:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          readOnly: true
        owner:
          type: object
          properties:
            id:
              type: string
              format: uuid
          readOnly: true
          description: License that owns the contact
        user:
          type: string
          format: uuid
        role:
          description: The contact's role in relation to the license
          oneOf:
            - type: string
            - $ref: '#/components/schemas/RefData'
    CustomPropertyDefinition:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        label:
          type: string
        description:
          type: string
        primary:
          type: boolean
        defaultInternal:
          type: boolean
        retired:
          type: boolean
        weight:
          type: integer
        type:
          type: string
          description: Java class name indicating the property type (e.g. CustomPropertyInteger, CustomPropertyText, CustomPropertyRefdata)
        category:
          $ref: '#/components/schemas/RefDataCategory'
    CustomPropertyValue:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          readOnly: true
        internal:
          type: boolean
        note:
          type: string
        publicNote:
          type: string
        value:
          oneOf:
            - type: string
            - type: integer
            - $ref: '#/components/schemas/RefData'
        type:
          $ref: '#/components/schemas/CustomPropertyDefinition'
    LicenseCore:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier
        name:
          type: string
          description: The name of the license or amendment
        description:
          type: string
          description: A description of the license or amendment
        status:
          description: The status (e.g. In negotiation, Not yet active, Active, Rejected, Expired)
          oneOf:
            - type: string
            - $ref: '#/components/schemas/RefData'
        startDate:
          type: string
          format: date
          description: The date on which the license or amendment becomes active
        endDate:
          type: string
          format: date
          description: The date on which the license or amendment expires
        endDateSemantics:
          description: How the end date should be interpreted (e.g. Explicit, Open ended, Implicit)
          oneOf:
            - type: string
            - $ref: '#/components/schemas/RefData'
        openEnded:
          type: boolean
          description: Derived flag indicating whether the license or amendment is open-ended
        dateCreated:
          type: string
          format: date-time
          readOnly: true
          description: The date and time the record was created
        lastUpdated:
          type: string
          format: date-time
          readOnly: true
          description: The date and time the record was last updated
        tags:
          type: array
          description: Tags applied to the license or amendment
          items:
            $ref: '#/components/schemas/Tag'
        docs:
          type: array
          description: Documents attached to the license or amendment
          items:
            $ref: '#/components/schemas/DocumentAttachment'
        supplementaryDocs:
          type: array
          description: Supplementary documents attached to the license or amendment
          items:
            $ref: '#/components/schemas/DocumentAttachment'
        contacts:
          type: array
          description: Internal contacts associated with the license or amendment
          items:
            $ref: '#/components/schemas/InternalContact'
        customProperties:
          type: object
          description: Custom properties (license terms) — keys are property names, values are arrays of property value instances
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/CustomPropertyValue'
    AlternateName:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        owner:
          type: object
          properties:
            id:
              type: string
              format: uuid
          readOnly: true
          description: License that owns the alternate name
    Organisation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        orgsUuid:
          type: string
          format: uuid
        orgsUuid_object:
          type: object
    LicenseOrg:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner:
          type: object
          properties:
            id:
              type: string
              format: uuid
          readOnly: true
          description: License that owns the organisation
        org:
          $ref: '#/components/schemas/Organisation'
        primaryOrg:
          type: boolean
          description: Whether this is the primary organisation for the license
          default: false
        note:
          type: string
          description: A note about this organisation's relationship to the license
        roles:
          type: array
          description: The roles this organisation plays in relation to the license
          items:
            type: object
            required:
              - id
              - role
            properties:
              id:
                type: string
                format: uuid
                readOnly: true
              owner:
                $ref: '#/components/schemas/LicenseOrg'
                readOnly: true
              role:
                description: The role (e.g. Licensor)
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/RefData'
              note:
                type: string
    LicenseAmendment:
      allOf:
        - $ref: '#/components/schemas/LicenseCore'
    License:
      allOf:
        - $ref: '#/components/schemas/LicenseCore'
        - type: object
          properties:
            type:
              description: The license type (e.g. Local, Consortial, National, Alliance)
              oneOf:
                - type: string
                - $ref: '#/components/schemas/RefData'
            localReference:
              type: string
              description: A local reference identifier for the license
            alternateNames:
              type: array
              description: Alternative names for the license
              items:
                $ref: '#/components/schemas/AlternateName'
            orgs:
              type: array
              description: Organisations associated with the license
              items:
                $ref: '#/components/schemas/LicenseOrg'
            amendments:
              type: array
              description: Amendments to the license, sorted by start date descending
              items:
                $ref: '#/components/schemas/LicenseAmendment'
    LicenseResultsArray:
      type: array
      items:
        $ref: '#/components/schemas/License'
    LicenseResults:
      type: object
      required:
        - results
      allOf:
        - $ref: '#/components/schemas/ResultsMeta'
        - type: object
        - properties:
            results:
              $ref: '#/components/schemas/LicenseResultsArray'
    GrailsErrorResponse:
      type: object
      description: Error-handler body for an uncaught exception raised during request processing. `exception` and `stackTrace` usually suppressed in production systems
      required:
        - error
        - timestamp
        - message
      properties:
        error:
          type: integer
          description: HTTP status code
        timestamp:
          type: string
          format: date-time
        message:
          type: string
        exception:
          type: string
          description: Exception class and message.
        stackTrace:
          type: array
          items:
            type: string
    ValidationError:
      type: object
      required:
        - message
        - path
        - _links
      properties:
        message:
          type: string
        path:
          type: string
        _links:
          type: object
          required:
            - self
          properties:
            self:
              type: object
              required:
                - href
              properties:
                href:
                  type: string
                  format: uri
    ValidationErrorResponse:
      description: 'Validation error body returned when a create/update request fails domain-object validation. Shape depends on the number of errors: a single ValidationError when there is exactly one, otherwise a wrapper with a count and an embedded array.'
      oneOf:
        - $ref: '#/components/schemas/ValidationError'
        - type: object
          required:
            - total
            - _embedded
          properties:
            total:
              type: integer
            _embedded:
              type: object
              properties:
                errors:
                  type: array
                  items:
