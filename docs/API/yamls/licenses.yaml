          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicyClaimResponse'
        '404':
          description: Not found error
        '405':
          description: Claiming is not supported on this resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicyClaimResponse'
        '500':
          description: Internal server error
          content:
