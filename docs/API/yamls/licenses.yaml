          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: 'Not found error: `domain` does not match any known domain class. Note an unrecognised `property` on a valid `domain` does not trigger this; it returns 200 with an empty result set instead. This action does not write its own error body, so the response has no content.'
